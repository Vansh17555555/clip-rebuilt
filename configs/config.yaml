# CLIP From Scratch Configuration File

dataset:
  name: "flickr8k"
  image_dir: "c:/Users/Vansh/clip/clip_from_scratch/data/flickr8k/Images"
  caption_file: "c:/Users/Vansh/clip/clip_from_scratch/data/flickr8k/captions.txt"
  batch_size: 64
  num_workers: 2
  vocab_min_freq: 2
  max_seq_len: 32

model:
  image:
    backbone: "resnet18"
    pretrained: false       # Set to true if fine-tuning, false for scratch
    feature_dim: 512       # ResNet18 output dim before FC
    projection_dim: 256    # Dimension of the projection space (shared_dim)
  
  text:
    word_embedding_dim: 128
    lstm_hidden_dim: 128
    lstm_num_layers: 2
    lstm_bidirectional: true
    projection_dim: 256    # Dimension of the projection space (shared_dim)

  temperature_init: 0.07   # Initial temperature value for contrastive loss scale

training:
  epochs: 15
  learning_rate: 0.001
  weight_decay: 0.0001
  lr_scheduler: "cosine"   # Supported: "cosine", "step", "none"
  step_size: 5            # For step scheduler
  gamma: 0.5              # For step scheduler
  device: "cuda"           # Automatically falls back to cpu if cuda not available
  checkpoint_dir: "c:/Users/Vansh/clip/clip_from_scratch/checkpoints"
  log_interval: 20
